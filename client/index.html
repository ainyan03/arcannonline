<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1: iOS がフォーム入力時に自動ズームして fixed UI が
         画面外へはみ出したまま戻らなくなるのを防ぐ (ピンチズーム抑止と同時) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://avatars.githubusercontent.com; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com wss://relay.damus.io wss://nos.lol wss://relay.nostr.band wss://nostr.mom wss://relay.primal.net wss://offchain.pub wss://nostr.oxtr.dev wss://relay.snort.social; frame-src https://arcannonline.firebaseapp.com https://github.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self' https://github.com"
    />
    <title>ArcannonLine</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        touch-action: none; /* スマホでのドラッグ視点・ダブルタップ用 */
      }
      .edge-markers {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .edge-marker {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        transform: translate(-50%, -50%);
        color: #fff;
        font: bold 11px sans-serif;
        text-shadow: 0 1px 2px #000;
      }
      .edge-marker .arrow {
        display: block;
        color: #ffd24d;
        font-size: 14px;
      }
      /* プレイヤー (仲間) のマーカーを敵より手前に出す */
      .edge-marker.player {
        z-index: 2;
      }
      .edge-marker.enemy {
        z-index: 1;
      }
      /* 敵マーカーは名前なしの小さな警告色矢印のみ */
      .edge-marker.enemy .arrow {
        color: #ff5d75;
        font-size: 11px;
      }
      .chat {
        position: fixed;
        left: 8px;
        right: 8px;
        bottom: 8px;
        font: 12px/1.5 sans-serif;
        color: #fff;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
      }
      .chat-log {
        width: fit-content;
        max-width: min(360px, 70vw);
        word-break: break-all;
        margin-bottom: 6px;
      }
      /* メッセージがある間だけ、背後のフィールドを暗くして文字を読みやすくする */
      .chat-log:not(:empty) {
        background: rgba(0, 8, 20, 0.55);
        border-radius: 8px;
        padding: 6px 10px;
      }
      .chat-log .name {
        color: #ffd24d;
      }
      .chat-log .sys {
        color: #a8d8ff;
      }
      .chat-input {
        display: block;
        pointer-events: auto;
        width: 100%;
        max-width: 560px;
        padding: 7px 10px;
        /* 16px 未満だと iOS がフォーカス時に自動ズームする */
        font-size: 16px;
        border: none;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.55);
        box-sizing: border-box;
        outline: none;
      }
      .chat-input:focus {
        background: rgba(255, 255, 255, 0.95);
      }
      .update-banner {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: rgba(20, 30, 40, 0.92);
        border: 1px solid #ffd24d;
        border-radius: 8px;
        color: #fff;
        font: 13px sans-serif;
        z-index: 10;
        white-space: nowrap;
      }
      .update-banner-reload {
        padding: 5px 12px;
        border: none;
        border-radius: 4px;
        background: #4a8f5a;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
      }
      .update-banner-close {
        padding: 2px 6px;
        border: none;
        background: none;
        color: #aaa;
        cursor: pointer;
        font-size: 15px;
      }
      .fire-btn {
        position: fixed;
        right: 20px;
        bottom: 88px;
        width: 74px;
        height: 74px;
        border-radius: 50%;
        background: rgba(255, 120, 60, 0.35);
        border: 2px solid rgba(255, 255, 255, 0.55);
        color: #fff;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
        padding: 0;
      }
      .fire-btn.held {
        background: rgba(255, 120, 60, 0.7);
      }
      .fire-btn.disabled {
        opacity: 0.35;
        border-color: rgba(255, 255, 255, 0.25);
      }
      .stick-base {
        position: fixed;
        left: 18px;
        bottom: 96px;
        width: 112px;
        height: 112px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid rgba(255, 255, 255, 0.3);
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      .stick-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 48px;
        height: 48px;
        margin: -24px 0 0 -24px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.35);
        pointer-events: none;
      }
      .script-chip {
        position: fixed;
        right: 20px;
        bottom: 172px;
        padding: 5px 12px;
        border-radius: 14px;
        background: rgba(20, 30, 40, 0.75);
        color: #fff;
        font: 11px sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
        border: none;
      }
      .hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #fff;
        font: 12px/1.6 monospace;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
        white-space: pre;
      }
      .base-status {
        position: fixed;
        top: 48px;
        left: 50%;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: auto min(260px, 34vw) 64px;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border: 1px solid rgba(126, 223, 255, 0.75);
        border-radius: 14px;
        background: rgba(20, 30, 52, 0.72);
        color: #dff8ff;
        font: bold 12px sans-serif;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
      }
      .base-status-bar {
        height: 8px;
        overflow: hidden;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.18);
      }
      .base-status-fill {
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #4caeff, #a7f6ff);
        transition: width 180ms ease;
      }
      .base-status.danger {
        border-color: #ff9a72;
        color: #ffd4c4;
      }
      .base-status.danger .base-status-fill {
        background: linear-gradient(90deg, #ff554c, #ffb35c);
      }
      .base-status.down {
        opacity: 0.72;
      }
      .leave-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        padding: 6px 12px;
        border-radius: 6px;
        background: rgba(20, 30, 40, 0.6);
        color: #fff;
        font: 12px sans-serif;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        border: none;
      }
      .leave-btn:hover {
        background: rgba(20, 30, 40, 0.85);
      }
      .sound-btn {
        position: fixed;
        top: 8px;
        right: 88px;
        width: 32px;
        height: 28px;
        padding: 0;
        border-radius: 6px;
        background: rgba(20, 30, 40, 0.6);
        color: #fff;
        font: 15px sans-serif;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        border: none;
      }
      .sound-btn:hover {
        background: rgba(20, 30, 40, 0.85);
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a2733;
        z-index: 10;
      }
      .panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 32px 40px;
        background: #263845;
        border-radius: 8px;
        color: #fff;
        font-family: sans-serif;
      }
      .panel h1 {
        margin: 0;
        font-size: 22px;
        text-align: center;
        letter-spacing: 0.04em;
      }
      .panel .tagline {
        margin: -6px 0 8px;
        font-size: 12px;
        text-align: center;
        color: #a8c8e0;
      }
      .panel input {
        font-size: 16px;
        padding: 8px;
        border: none;
        border-radius: 4px;
      }
      .panel .row {
        display: flex;
        gap: 8px;
      }
      .panel select {
        flex: 1;
        /* 16px 未満だと iOS がフォーカス時に自動ズームする */
        font-size: 16px;
        padding: 6px;
        border: none;
        border-radius: 4px;
      }
      .panel input[type='color'] {
        width: 48px;
        height: 34px;
        padding: 2px;
        cursor: pointer;
      }
      .panel button {
        font-size: 16px;
        padding: 8px;
        border: none;
        border-radius: 4px;
        background: #4a8f5a;
        color: #fff;
        cursor: pointer;
      }
      .panel button:hover {
        background: #57a569;
      }
      .panel .gh-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        font-size: 13px;
      }
      .panel .gh-row button.gh-login {
        flex: 1;
        font-size: 13px;
        padding: 6px 8px;
        background: #24292f;
      }
      .panel .gh-row button.gh-login:hover {
        background: #32383f;
      }
      .panel .gh-row img {
        width: 26px;
        height: 26px;
        border-radius: 6px;
      }
      .panel .gh-row .gh-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .panel .gh-row .gh-badge {
        color: #57d57a;
      }
      .panel .gh-row button.gh-unlink {
        flex: 0 0 auto;
        font-size: 12px;
        padding: 4px 6px;
        background: none;
        color: #a8c8e0;
        text-decoration: underline;
      }
      .panel .gh-row button.gh-unlink:hover {
        background: none;
        color: #d0e8f8;
      }
      .panel .gh-error {
        margin: -6px 0 0;
        font-size: 12px;
        color: #ff9a8a;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
