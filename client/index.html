<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>弾幕フィールド試作</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        touch-action: none; /* スマホでのドラッグ視点・ダブルタップ用 */
      }
      .edge-markers {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .edge-marker {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        transform: translate(-50%, -50%);
        color: #fff;
        font: bold 11px sans-serif;
        text-shadow: 0 1px 2px #000;
      }
      .edge-marker .arrow {
        display: block;
        color: #ffd24d;
        font-size: 14px;
      }
      .hitflash {
        position: fixed;
        inset: 0;
        background: rgba(255, 32, 32, 0.28);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s;
      }
      .hitflash.on {
        opacity: 1;
        transition: none;
      }
      .chat {
        position: fixed;
        left: 8px;
        right: 8px;
        bottom: 8px;
        font: 12px/1.5 sans-serif;
        color: #fff;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
      }
      .chat-log {
        width: min(360px, 70vw);
        word-break: break-all;
        margin-bottom: 6px;
      }
      .chat-log .name {
        color: #ffd24d;
      }
      .chat-log .sys {
        color: #a8d8ff;
      }
      .chat-input {
        display: block;
        pointer-events: auto;
        width: 100%;
        max-width: 560px;
        padding: 7px 10px;
        font-size: 13px;
        border: none;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.55);
        box-sizing: border-box;
        outline: none;
      }
      .chat-input:focus {
        background: rgba(255, 255, 255, 0.95);
      }
      .editor {
        display: none;
        position: fixed;
        top: 8px;
        right: 8px;
        width: 360px;
        padding: 12px;
        background: rgba(20, 30, 40, 0.92);
        border-radius: 8px;
        color: #fff;
        font-family: sans-serif;
      }
      .editor .title {
        font-size: 13px;
        font-weight: bold;
        margin-bottom: 6px;
      }
      .editor textarea {
        width: 100%;
        height: 240px;
        font: 12px/1.4 monospace;
        border: none;
        border-radius: 4px;
        padding: 6px;
        box-sizing: border-box;
        resize: vertical;
      }
      .editor .err {
        color: #ff9999;
        font: 11px monospace;
        white-space: pre-wrap;
        min-height: 14px;
        margin: 4px 0;
      }
      .editor .buttons {
        display: flex;
        gap: 8px;
      }
      .editor button {
        flex: 1;
        padding: 6px;
        border: none;
        border-radius: 4px;
        background: #4a8f5a;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
      }
      .hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #fff;
        font: 12px/1.6 monospace;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
        white-space: pre;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a2733;
        z-index: 10;
      }
      .panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 32px 40px;
        background: #263845;
        border-radius: 8px;
        color: #fff;
        font-family: sans-serif;
      }
      .panel h1 {
        margin: 0 0 8px;
        font-size: 20px;
        text-align: center;
      }
      .panel input {
        font-size: 16px;
        padding: 8px;
        border: none;
        border-radius: 4px;
      }
      .panel button {
        font-size: 16px;
        padding: 8px;
        border: none;
        border-radius: 4px;
        background: #4a8f5a;
        color: #fff;
        cursor: pointer;
      }
      .panel button:hover {
        background: #57a569;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
