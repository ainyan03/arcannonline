<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>弾幕フィールド試作</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        touch-action: none; /* スマホでのドラッグ視点・ダブルタップ用 */
      }
      .edge-markers {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .edge-marker {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        transform: translate(-50%, -50%);
        color: #fff;
        font: bold 11px sans-serif;
        text-shadow: 0 1px 2px #000;
      }
      .edge-marker .arrow {
        display: block;
        color: #ffd24d;
        font-size: 14px;
      }
      .hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #fff;
        font: 12px/1.6 monospace;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
        white-space: pre;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a2733;
        z-index: 10;
      }
      .panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 32px 40px;
        background: #263845;
        border-radius: 8px;
        color: #fff;
        font-family: sans-serif;
      }
      .panel h1 {
        margin: 0 0 8px;
        font-size: 20px;
        text-align: center;
      }
      .panel input {
        font-size: 16px;
        padding: 8px;
        border: none;
        border-radius: 4px;
      }
      .panel button {
        font-size: 16px;
        padding: 8px;
        border: none;
        border-radius: 4px;
        background: #4a8f5a;
        color: #fff;
        cursor: pointer;
      }
      .panel button:hover {
        background: #57a569;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
